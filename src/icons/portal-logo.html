<!DOCTYPE html>
<html lang="en">
<head>

<title>Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  background: #09080f;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
</style>
</head>
<body>

  <defs>

      <stop offset="0%" stop-color="#1E1B2E"/>
      <stop offset="100%" stop-color="#2D2640"/>

    <radialGradient id="pD" cx="0.5" cy="0.43" r="0.55">

      <stop offset="85%" stop-color="#C4B5FD"/>

      <ellipse cx="56" cy="70" rx="32" ry="44" fill="none" stroke="#C4B5FD" stroke-width="1" opacity="0.14"/>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal — Light Logo</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f8f8f8;
    }
  </style>
</head>
<body>
  <svg viewBox="0 0 440 140" width="440" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="fL" x1="0.2" y1="0" x2="0.8" y2="1">
        <stop offset="0%" stop-color="#F5F3FF"/>
        <stop offset="100%" stop-color="#DDD6FE"/>
      </linearGradient>
      <radialGradient id="pL" cx="0.5" cy="0.43" r="0.55">
        <stop offset="0%" stop-color="#FDFCFF"/>
        <stop offset="22%" stop-color="#F3E8FF"/>
        <stop offset="45%" stop-color="#E9D5FF"/>
        <stop offset="65%" stop-color="#D8B4FE"/>
        <stop offset="85%" stop-color="#C4B5FD"/>
        <stop offset="100%" stop-color="#B197FC"/>
      </radialGradient>
      <radialGradient id="bL" cx="0.5" cy="0.4" r="0.25">
        <stop offset="0%" stop-color="#fff"/>
        <stop offset="30%" stop-color="#FAF5FF" stop-opacity="0.9"/>
        <stop offset="60%" stop-color="#F3E8FF" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#E9D5FF" stop-opacity="0"/>
      </radialGradient>
      <filter id="sL" x="-8%" y="-6%" width="116%" height="116%">
        <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#7E22CE" flood-opacity="0.12"/>
      </filter>
      <clipPath id="cL">
        <rect x="22" y="20" width="68" height="96" rx="34"/>
      </clipPath>
    </defs>
    <g transform="translate(6,2)">
      <rect x="4" y="2" width="104" height="132" rx="30" fill="url(#fL)" filter="url(#sL)"/>
      <rect x="4" y="2" width="104" height="132" rx="30" fill="none" stroke="#C4B5FD" stroke-width="1.2" stroke-opacity="0.5"/>
      <rect x="22" y="20" width="68" height="96" rx="34" fill="url(#pL)"/>
      <g clip-path="url(#cL)">
        <ellipse cx="56" cy="70" rx="32" ry="44" fill="none" stroke="#C4B5FD" stroke-width="1" opacity="0.14"/>
        <ellipse cx="56" cy="67" rx="26" ry="36" fill="none" stroke="#FAF5FF" stroke-width="0.9" opacity="0.17"/>
        <ellipse cx="56" cy="64" rx="20" ry="28" fill="none" stroke="#E9D5FF" stroke-width="0.8" opacity="0.2"/>
        <ellipse cx="56" cy="61" rx="14" ry="20" fill="none" stroke="#FAF5FF" stroke-width="0.7" opacity="0.26"/>
        <ellipse cx="56" cy="59" rx="9" ry="13" fill="none" stroke="#FAF5FF" stroke-width="0.6" opacity="0.34"/>
        <rect x="22" y="20" width="68" height="96" rx="34" fill="url(#bL)"/>
      </g>
      <circle cx="56" cy="56" r="6" fill="#fff" opacity="0.95"/>
      <circle cx="56" cy="56" r="2.5" fill="#fff"/>
    </g>
    <text x="148" y="72" font-family="'Satoshi', -apple-system, sans-serif" font-size="64" font-weight="700" fill="#0f0f0f" letter-spacing="-2" dominant-baseline="central">Portal</text>
  </svg>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-drag-region"></div>

      <div class="sidebar-header">
        <div class="logo">
          <!-- Dark mode logo -->
          <svg class="logo-icon logo-icon-dark" width="30" height="36" viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="sb-fD" x1="0.2" y1="0" x2="0.8" y2="1"><stop offset="0%" stop-color="#1E1B2E"/><stop offset="100%" stop-color="#2D2640"/></linearGradient>
              <radialGradient id="sb-pD" cx="0.5" cy="0.43" r="0.55"><stop offset="0%" stop-color="#FDFCFF"/><stop offset="22%" stop-color="#F3E8FF"/><stop offset="45%" stop-color="#E9D5FF"/><stop offset="65%" stop-color="#D8B4FE"/><stop offset="85%" stop-color="#C4B5FD"/><stop offset="100%" stop-color="#B197FC"/></radialGradient>
              <radialGradient id="sb-bD" cx="0.5" cy="0.4" r="0.25"><stop offset="0%" stop-color="#fff"/><stop offset="30%" stop-color="#FAF5FF" stop-opacity="0.9"/><stop offset="60%" stop-color="#F3E8FF" stop-opacity="0.5"/><stop offset="100%" stop-color="#E9D5FF" stop-opacity="0"/></radialGradient>
              <filter id="sb-sD" x="-10%" y="-8%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#A855F7" flood-opacity="0.25"/></filter>
              <clipPath id="sb-cD"><rect x="22" y="20" width="68" height="96" rx="34"/></clipPath>
            </defs>
            <g transform="translate(6,2)">
              <rect x="4" y="2" width="104" height="132" rx="30" fill="url(#sb-fD)" filter="url(#sb-sD)"/>
              <rect x="4" y="2" width="104" height="132" rx="30" fill="none" stroke="#7C3AED" stroke-width="1" stroke-opacity="0.3"/>
              <rect x="22" y="20" width="68" height="96" rx="34" fill="url(#sb-pD)"/>
              <g clip-path="url(#sb-cD)">
                <ellipse cx="56" cy="70" rx="32" ry="44" fill="none" stroke="#C4B5FD" stroke-width="1" opacity="0.14"/>
                <ellipse cx="56" cy="67" rx="26" ry="36" fill="none" stroke="#FAF5FF" stroke-width="0.9" opacity="0.17"/>
                <ellipse cx="56" cy="64" rx="20" ry="28" fill="none" stroke="#E9D5FF" stroke-width="0.8" opacity="0.2"/>
                <ellipse cx="56" cy="61" rx="14" ry="20" fill="none" stroke="#FAF5FF" stroke-width="0.7" opacity="0.26"/>
                <ellipse cx="56" cy="59" rx="9" ry="13" fill="none" stroke="#FAF5FF" stroke-width="0.6" opacity="0.34"/>
                <rect x="22" y="20" width="68" height="96" rx="34" fill="url(#sb-bD)"/>
              </g>
              <circle cx="56" cy="56" r="6" fill="#fff" opacity="0.95"/>
              <circle cx="56" cy="56" r="2.5" fill="#fff"/>
            </g>
          </svg>
          <!-- Light mode logo -->
          <svg class="logo-icon logo-icon-light" width="30" height="36" viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="sb-fL" x1="0.2" y1="0" x2="0.8" y2="1"><stop offset="0%" stop-color="#F5F3FF"/><stop offset="100%" stop-color="#DDD6FE"/></linearGradient>
              <radialGradient id="sb-pL" cx="0.5" cy="0.43" r="0.55"><stop offset="0%" stop-color="#FDFCFF"/><stop offset="22%" stop-color="#F3E8FF"/><stop offset="45%" stop-color="#E9D5FF"/><stop offset="65%" stop-color="#D8B4FE"/><stop offset="85%" stop-color="#C4B5FD"/><stop offset="100%" stop-color="#B197FC"/></radialGradient>
              <radialGradient id="sb-bL" cx="0.5" cy="0.4" r="0.25"><stop offset="0%" stop-color="#fff"/><stop offset="30%" stop-color="#FAF5FF" stop-opacity="0.9"/><stop offset="60%" stop-color="#F3E8FF" stop-opacity="0.5"/><stop offset="100%" stop-color="#E9D5FF" stop-opacity="0"/></radialGradient>
              <filter id="sb-sL" x="-8%" y="-6%" width="116%" height="116%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#7E22CE" flood-opacity="0.12"/></filter>
              <clipPath id="sb-cL"><rect x="22" y="20" width="68" height="96" rx="34"/></clipPath>
            </defs>
            <g transform="translate(6,2)">
              <rect x="4" y="2" width="104" height="132" rx="30" fill="url(#sb-fL)" filter="url(#sb-sL)"/>
              <rect x="4" y="2" width="104" height="132" rx="30" fill="none" stroke="#C4B5FD" stroke-width="1.2" stroke-opacity="0.5"/>
              <rect x="22" y="20" width="68" height="96" rx="34" fill="url(#sb-pL)"/>
              <g clip-path="url(#sb-cL)">
                <ellipse cx="56" cy="70" rx="32" ry="44" fill="none" stroke="#C4B5FD" stroke-width="1" opacity="0.14"/>
                <ellipse cx="56" cy="67" rx="26" ry="36" fill="none" stroke="#FAF5FF" stroke-width="0.9" opacity="0.17"/>
                <ellipse cx="56" cy="64" rx="20" ry="28" fill="none" stroke="#E9D5FF" stroke-width="0.8" opacity="0.2"/>
                <ellipse cx="56" cy="61" rx="14" ry="20" fill="none" stroke="#FAF5FF" stroke-width="0.7" opacity="0.26"/>
                <ellipse cx="56" cy="59" rx="9" ry="13" fill="none" stroke="#FAF5FF" stroke-width="0.6" opacity="0.34"/>
                <rect x="22" y="20" width="68" height="96" rx="34" fill="url(#sb-bL)"/>
              </g>
              <circle cx="56" cy="56" r="6" fill="#fff" opacity="0.95"/>
              <circle cx="56" cy="56" r="2.5" fill="#fff"/>
            </g>
          </svg>
          <span class="logo-text">Portal</span>
        </div>
      </div>

      <!-- Quick URL Input -->
      <div class="sidebar-url-bar">
        <input
          type="text"
          id="url-input"
          placeholder="Enter URL or search..."
          spellcheck="false"
          autocomplete="off"
        />
      </div>

      <!-- Tabs -->
      <div class="sidebar-section">
        <div class="section-label">
          <span>Open</span>
          <button class="icon-btn" id="new-tab-btn" title="New tab">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
        <div id="tabs-list" class="tabs-list"></div>
      </div>

      <!-- Saved Sites -->
      <div class="sidebar-section">
        <div class="section-label">
          <span>Saved</span>
          <button class="icon-btn" id="save-site-btn" title="Save current site">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
              <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
            </svg>
          </button>
        </div>
        <div id="saved-list" class="saved-list"></div>
      </div>

      <!-- Bottom Actions -->
      <div class="sidebar-footer">
        <button class="icon-btn footer-btn" id="devtools-btn" title="Toggle DevTools">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- Content Area -->
    <main id="content" class="content">
      <!-- Titlebar -->
      <div class="titlebar">
        <div class="titlebar-nav">
          <button class="icon-btn" id="back-btn" title="Go back">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <button class="icon-btn" id="forward-btn" title="Go forward">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <polyline points="9 6 15 12 9 18"/>
            </svg>
          </button>
          <button class="icon-btn" id="reload-btn" title="Reload">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
            </svg>
          </button>
        </div>
        <div class="titlebar-center">
          <div class="titlebar-page-info">
            <span id="titlebar-title" class="titlebar-title">Portal</span>
            <span id="titlebar-url" class="titlebar-url"></span>
          </div>
        </div>
        <div class="titlebar-actions">
          <button class="icon-btn" id="theme-toggle-btn" title="Toggle light/dark mode">
            <!-- Sun icon (shown in dark mode, click to go light) -->
            <svg class="theme-icon theme-icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <!-- Moon icon (shown in light mode, click to go dark) -->
            <svg class="theme-icon theme-icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="content-body">
      <div class="content-frame">
        <!-- Welcome screen shown when no tab is active -->
        <div id="welcome" class="welcome">
          <div class="welcome-inner">
            <!-- Dark mode welcome logo -->
            <svg class="welcome-logo welcome-logo-dark" width="69" height="80" viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="w-fD" x1="0.2" y1="0" x2="0.8" y2="1"><stop offset="0%" stop-color="#1E1B2E"/><stop offset="100%" stop-color="#2D2640"/></linearGradient>
                <radialGradient id="w-pD" cx="0.5" cy="0.43" r="0.55"><stop offset="0%" stop-color="#FDFCFF"/><stop offset="22%" stop-color="#F3E8FF"/><stop offset="45%" stop-color="#E9D5FF"/><stop offset="65%" stop-color="#D8B4FE"/><stop offset="85%" stop-color="#C4B5FD"/><stop offset="100%" stop-color="#B197FC"/></radialGradient>
                <radialGradient id="w-bD" cx="0.5" cy="0.4" r="0.25"><stop offset="0%" stop-color="#fff"/><stop offset="30%" stop-color="#FAF5FF" stop-opacity="0.9"/><stop offset="60%" stop-color="#F3E8FF" stop-opacity="0.5"/><stop offset="100%" stop-color="#E9D5FF" stop-opacity="0"/></radialGradient>
                <filter id="w-sD" x="-10%" y="-8%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#A855F7" flood-opacity="0.25"/></filter>
                <clipPath id="w-cD"><rect x="22" y="20" width="68" height="96" rx="34"/></clipPath>
              </defs>
              <g transform="translate(6,2)">
                <rect x="4" y="2" width="104" height="132" rx="30" fill="url(#w-fD)" filter="url(#w-sD)"/>
                <rect x="4" y="2" width="104" height="132" rx="30" fill="none" stroke="#7C3AED" stroke-width="1" stroke-opacity="0.3"/>
                <rect x="22" y="20" width="68" height="96" rx="34" fill="url(#w-pD)"/>
                <g clip-path="url(#w-cD)">
                  <ellipse cx="56" cy="70" rx="32" ry="44" fill="none" stroke="#C4B5FD" stroke-width="1" opacity="0.14"/>
                  <ellipse cx="56" cy="67" rx="26" ry="36" fill="none" stroke="#FAF5FF" stroke-width="0.9" opacity="0.17"/>
                  <ellipse cx="56" cy="64" rx="20" ry="28" fill="none" stroke="#E9D5FF" stroke-width="0.8" opacity="0.2"/>
                  <ellipse cx="56" cy="61" rx="14" ry="20" fill="none" stroke="#FAF5FF" stroke-width="0.7" opacity="0.26"/>
                  <ellipse cx="56" cy="59" rx="9" ry="13" fill="none" stroke="#FAF5FF" stroke-width="0.6" opacity="0.34"/>
                  <rect x="22" y="20" width="68" height="96" rx="34" fill="url(#w-bD)"/>
                </g>
                <circle cx="56" cy="56" r="6" fill="#fff" opacity="0.95"/>
                <circle cx="56" cy="56" r="2.5" fill="#fff"/>
              </g>
            </svg>
            <!-- Light mode welcome logo -->
            <svg class="welcome-logo welcome-logo-light" width="69" height="80" viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="w-fL" x1="0.2" y1="0" x2="0.8" y2="1"><stop offset="0%" stop-color="#F5F3FF"/><stop offset="100%" stop-color="#DDD6FE"/></linearGradient>
                <radialGradient id="w-pL" cx="0.5" cy="0.43" r="0.55"><stop offset="0%" stop-color="#FDFCFF"/><stop offset="22%" stop-color="#F3E8FF"/><stop offset="45%" stop-color="#E9D5FF"/><stop offset="65%" stop-color="#D8B4FE"/><stop offset="85%" stop-color="#C4B5FD"/><stop offset="100%" stop-color="#B197FC"/></radialGradient>
                <radialGradient id="w-bL" cx="0.5" cy="0.4" r="0.25"><stop offset="0%" stop-color="#fff"/><stop offset="30%" stop-color="#FAF5FF" stop-opacity="0.9"/><stop offset="60%" stop-color="#F3E8FF" stop-opacity="0.5"/><stop offset="100%" stop-color="#E9D5FF" stop-opacity="0"/></radialGradient>
                <filter id="w-sL" x="-8%" y="-6%" width="116%" height="116%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#7E22CE" flood-opacity="0.12"/></filter>
                <clipPath id="w-cL"><rect x="22" y="20" width="68" height="96" rx="34"/></clipPath>
              </defs>
              <g transform="translate(6,2)">
                <rect x="4" y="2" width="104" height="132" rx="30" fill="url(#w-fL)" filter="url(#w-sL)"/>
                <rect x="4" y="2" width="104" height="132" rx="30" fill="none" stroke="#C4B5FD" stroke-width="1.2" stroke-opacity="0.5"/>
                <rect x="22" y="20" width="68" height="96" rx="34" fill="url(#w-pL)"/>
                <g clip-path="url(#w-cL)">
                  <ellipse cx="56" cy="70" rx="32" ry="44" fill="none" stroke="#C4B5FD" stroke-width="1" opacity="0.14"/>
                  <ellipse cx="56" cy="67" rx="26" ry="36" fill="none" stroke="#FAF5FF" stroke-width="0.9" opacity="0.17"/>
                  <ellipse cx="56" cy="64" rx="20" ry="28" fill="none" stroke="#E9D5FF" stroke-width="0.8" opacity="0.2"/>
                  <ellipse cx="56" cy="61" rx="14" ry="20" fill="none" stroke="#FAF5FF" stroke-width="0.7" opacity="0.26"/>
                  <ellipse cx="56" cy="59" rx="9" ry="13" fill="none" stroke="#FAF5FF" stroke-width="0.6" opacity="0.34"/>
                  <rect x="22" y="20" width="68" height="96" rx="34" fill="url(#w-bL)"/>
                </g>
                <circle cx="56" cy="56" r="6" fill="#fff" opacity="0.95"/>
                <circle cx="56" cy="56" r="2.5" fill="#fff"/>
              </g>
            </svg>
            <h1 class="welcome-title">Portal</h1>
            <p class="welcome-subtitle">Enter a URL above to begin</p>
          </div>
        </div>

        <!-- Webviews get injected here -->
        <div id="webview-container" class="webview-container"></div>
      </div>

      </div>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>

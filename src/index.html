<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/titlebar.css">
  <link rel="stylesheet" href="styles/sidebar.css">
  <link rel="stylesheet" href="styles/content.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/floating-sidebar.css">
  <link rel="stylesheet" href="styles/light-mode.css">
  <link rel="stylesheet" href="styles/update-toast.css">
</head>
<body>
  <div id="app">
    <!-- Titlebar — full width, drag region -->
    <header id="titlebar" class="titlebar">
      <div class="titlebar-drag-region"></div>

      <!-- Left: traffic light spacer + sidebar toggle + logo -->
      <div class="titlebar-left">
        <button class="icon-btn sidebar-collapse-btn" id="sidebar-collapse-btn" title="Toggle sidebar"></button>
        <div class="titlebar-logo">
          <!-- Dark mode logo -->
          <svg class="logo-icon logo-icon-dark" width="20" height="23" viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="tb-fD" x1="0.2" y1="0" x2="0.8" y2="1"><stop offset="0%" stop-color="#1E1B2E"/><stop offset="100%" stop-color="#2D2640"/></linearGradient>
              <radialGradient id="tb-pD" cx="0.5" cy="0.43" r="0.55"><stop offset="0%" stop-color="#FDFCFF"/><stop offset="22%" stop-color="#F3E8FF"/><stop offset="45%" stop-color="#E9D5FF"/><stop offset="65%" stop-color="#D8B4FE"/><stop offset="85%" stop-color="#C4B5FD"/><stop offset="100%" stop-color="#B197FC"/></radialGradient>
              <radialGradient id="tb-bD" cx="0.5" cy="0.4" r="0.25"><stop offset="0%" stop-color="#fff"/><stop offset="30%" stop-color="#FAF5FF" stop-opacity="0.9"/><stop offset="60%" stop-color="#F3E8FF" stop-opacity="0.5"/><stop offset="100%" stop-color="#E9D5FF" stop-opacity="0"/></radialGradient>
              <filter id="tb-sD" x="-10%" y="-8%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#A855F7" flood-opacity="0.25"/></filter>
              <clipPath id="tb-cD"><rect x="22" y="20" width="68" height="96" rx="34"/></clipPath>
            </defs>
            <g transform="translate(6,2)">
              <rect x="4" y="2" width="104" height="132" rx="30" fill="url(#tb-fD)" filter="url(#tb-sD)"/>
              <rect x="4" y="2" width="104" height="132" rx="30" fill="none" stroke="#7C3AED" stroke-width="1" stroke-opacity="0.3"/>
              <rect x="22" y="20" width="68" height="96" rx="34" fill="url(#tb-pD)"/>
              <g clip-path="url(#tb-cD)">
                <ellipse cx="56" cy="70" rx="32" ry="44" fill="none" stroke="#C4B5FD" stroke-width="1" opacity="0.14"/>
                <ellipse cx="56" cy="67" rx="26" ry="36" fill="none" stroke="#FAF5FF" stroke-width="0.9" opacity="0.17"/>
                <ellipse cx="56" cy="64" rx="20" ry="28" fill="none" stroke="#E9D5FF" stroke-width="0.8" opacity="0.2"/>
                <ellipse cx="56" cy="61" rx="14" ry="20" fill="none" stroke="#FAF5FF" stroke-width="0.7" opacity="0.26"/>
                <ellipse cx="56" cy="59" rx="9" ry="13" fill="none" stroke="#FAF5FF" stroke-width="0.6" opacity="0.34"/>
                <rect x="22" y="20" width="68" height="96" rx="34" fill="url(#tb-bD)"/>
              </g>
              <circle cx="56" cy="56" r="6" fill="#fff" opacity="0.95"/>
              <circle cx="56" cy="56" r="2.5" fill="#fff"/>
            </g>
          </svg>
          <!-- Light mode logo -->
          <svg class="logo-icon logo-icon-light" width="20" height="23" viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="tb-fL" x1="0.2" y1="0" x2="0.8" y2="1"><stop offset="0%" stop-color="#F5F3FF"/><stop offset="100%" stop-color="#DDD6FE"/></linearGradient>
              <radialGradient id="tb-pL" cx="0.5" cy="0.43" r="0.55"><stop offset="0%" stop-color="#FDFCFF"/><stop offset="22%" stop-color="#F3E8FF"/><stop offset="45%" stop-color="#E9D5FF"/><stop offset="65%" stop-color="#D8B4FE"/><stop offset="85%" stop-color="#C4B5FD"/><stop offset="100%" stop-color="#B197FC"/></radialGradient>
              <radialGradient id="tb-bL" cx="0.5" cy="0.4" r="0.25"><stop offset="0%" stop-color="#fff"/><stop offset="30%" stop-color="#FAF5FF" stop-opacity="0.9"/><stop offset="60%" stop-color="#F3E8FF" stop-opacity="0.5"/><stop offset="100%" stop-color="#E9D5FF" stop-opacity="0"/></radialGradient>
              <filter id="tb-sL" x="-8%" y="-6%" width="116%" height="116%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#7E22CE" flood-opacity="0.12"/></filter>
              <clipPath id="tb-cL"><rect x="22" y="20" width="68" height="96" rx="34"/></clipPath>
            </defs>
            <g transform="translate(6,2)">
              <rect x="4" y="2" width="104" height="132" rx="30" fill="url(#tb-fL)" filter="url(#tb-sL)"/>
              <rect x="4" y="2" width="104" height="132" rx="30" fill="none" stroke="#C4B5FD" stroke-width="1.2" stroke-opacity="0.5"/>
              <rect x="22" y="20" width="68" height="96" rx="34" fill="url(#tb-pL)"/>
              <g clip-path="url(#tb-cL)">
                <ellipse cx="56" cy="70" rx="32" ry="44" fill="none" stroke="#C4B5FD" stroke-width="1" opacity="0.14"/>
                <ellipse cx="56" cy="67" rx="26" ry="36" fill="none" stroke="#FAF5FF" stroke-width="0.9" opacity="0.17"/>
                <ellipse cx="56" cy="64" rx="20" ry="28" fill="none" stroke="#E9D5FF" stroke-width="0.8" opacity="0.2"/>
                <ellipse cx="56" cy="61" rx="14" ry="20" fill="none" stroke="#FAF5FF" stroke-width="0.7" opacity="0.26"/>
                <ellipse cx="56" cy="59" rx="9" ry="13" fill="none" stroke="#FAF5FF" stroke-width="0.6" opacity="0.34"/>
                <rect x="22" y="20" width="68" height="96" rx="34" fill="url(#tb-bL)"/>
              </g>
              <circle cx="56" cy="56" r="6" fill="#fff" opacity="0.95"/>
              <circle cx="56" cy="56" r="2.5" fill="#fff"/>
            </g>
          </svg>
          <span class="logo-text">Portal</span>
        </div>
      </div>

      <!-- Center: URL / Search bar -->
      <div class="titlebar-center">
        <div class="titlebar-url-bar">
          <div class="url-input-icon"></div>
          <input
            type="text"
            id="url-input"
            placeholder="Search or enter URL"
            spellcheck="false"
            autocomplete="off"
          />
        </div>
      </div>

      <!-- Right: nav + actions -->
      <div class="titlebar-right">
        <div class="titlebar-group">
          <button class="icon-btn" id="back-btn" title="Go back"></button>
          <button class="icon-btn" id="forward-btn" title="Go forward"></button>
          <button class="icon-btn" id="reload-btn" title="Reload"></button>
        </div>
        <div class="titlebar-divider"></div>
        <div class="titlebar-group">
          <button class="icon-btn" id="devtools-btn" title="Toggle DevTools"></button>
          <button class="icon-btn" id="theme-toggle-btn" title="Toggle light/dark mode">
            <span class="theme-icon theme-icon-sun"></span>
            <span class="theme-icon theme-icon-moon"></span>
          </button>
        </div>
      </div>
    </header>

    <!-- App body: sidebar + content -->
    <div class="app-body">
      <!-- Sidebar hover trigger (visible when collapsed) -->
      <div id="sidebar-trigger" class="sidebar-trigger">
        <div class="sidebar-trigger-icon"></div>
      </div>

      <!-- Sidebar -->
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-inner">
          <!-- Pinned Tabs -->
          <div class="sidebar-pinned-tabs" id="sidebar-pinned-tabs">
            <div id="pinned-list" class="pinned-list"></div>
          </div>

          <!-- Saved Sites -->
          <div class="sidebar-saved">
            <div class="section-label">
              <span>Saved</span>
              <button class="icon-btn" id="save-site-btn" title="Save current site"></button>
            </div>
            <div id="saved-list" class="saved-list"></div>
          </div>

          <!-- Tabs — main scrollable area -->
          <div class="sidebar-tabs">
            <div class="section-label">
              <span>Tabs</span>
              <button class="icon-btn" id="new-tab-btn" title="New tab"></button>
            </div>
            <div id="tabs-list" class="tabs-list"></div>
          </div>

          <!-- Account tile — bottom of sidebar -->
          <div class="sidebar-footer">
            <button class="account-tile" id="account-tile">
              <div class="account-avatar" id="account-avatar">
                <span class="account-avatar-initials" id="account-initials"></span>
                <img class="account-avatar-photo" id="account-photo" alt="" />
              </div>
              <div class="account-info">
                <span class="account-name" id="account-name">Set up profile</span>
                <span class="account-email" id="account-email"></span>
              </div>
            </button>
          </div>
        </div>
      </aside>

      <!-- Account settings modal -->
      <div class="modal-overlay" id="account-modal">
        <div class="modal" id="account-modal-inner">
          <div class="modal-header">
            <h2 class="modal-title">Profile</h2>
            <button class="icon-btn modal-close" id="account-modal-close"></button>
          </div>
          <div class="modal-body">
            <div class="profile-photo-section">
              <div class="profile-photo-preview" id="profile-photo-preview">
                <span class="profile-photo-initials" id="profile-photo-initials"></span>
                <img class="profile-photo-img" id="profile-photo-img" alt="" />
              </div>
              <div class="profile-photo-actions">
                <button class="btn btn-secondary" id="profile-photo-upload">Upload photo</button>
                <button class="btn btn-ghost" id="profile-photo-remove">Remove</button>
                <input type="file" id="profile-photo-input" accept="image/*" hidden />
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label class="form-label" for="profile-first-name">First name</label>
                <input class="form-input" type="text" id="profile-first-name" placeholder="First name" spellcheck="false" autocomplete="off" />
              </div>
              <div class="form-field">
                <label class="form-label" for="profile-last-name">Last name</label>
                <input class="form-input" type="text" id="profile-last-name" placeholder="Last name" spellcheck="false" autocomplete="off" />
              </div>
            </div>
            <div class="form-field">
              <label class="form-label" for="profile-email">Email</label>
              <input class="form-input" type="email" id="profile-email" placeholder="you@example.com" spellcheck="false" autocomplete="off" />
            </div>
          </div>
          <!-- About Section -->
          <div class="modal-divider"></div>
          <div class="modal-body about-section">
            <div class="about-row">
              <span class="about-label">Portal <span id="about-version">v0.1.0</span></span>
              <button class="btn btn-secondary about-update-btn" id="about-check-update">Check for updates</button>
            </div>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" id="account-modal-cancel">Cancel</button>
            <button class="btn btn-primary" id="account-modal-save">Save</button>
          </div>
        </div>
      </div>

      <!-- Content Area -->
      <main id="content" class="content">
      <div class="content-frame">
        <!-- Welcome screen shown when no tab is active -->
        <div id="welcome" class="welcome">
          <div class="welcome-inner">
            <h1 class="welcome-greeting" id="welcome-greeting"></h1>

            <div class="welcome-shortcuts" id="welcome-shortcuts">
              <a class="shortcut-tile" data-url="https://google.com" title="Google">
                <img src="https://www.google.com/favicon.ico" alt="Google" width="20" height="20" />
              </a>
              <a class="shortcut-tile" data-url="https://youtube.com" title="YouTube">
                <img src="https://www.youtube.com/favicon.ico" alt="YouTube" width="20" height="20" />
              </a>
              <a class="shortcut-tile" data-url="https://github.com" title="GitHub">
                <img src="https://github.com/favicon.ico" alt="GitHub" width="20" height="20" />
              </a>
              <a class="shortcut-tile" data-url="https://twitter.com" title="X">
                <img src="https://abs.twimg.com/favicons/twitter.3.ico" alt="X" width="20" height="20" />
              </a>
              <a class="shortcut-tile" data-url="https://reddit.com" title="Reddit">
                <img src="https://www.reddit.com/favicon.ico" alt="Reddit" width="20" height="20" />
              </a>
              <a class="shortcut-tile" data-url="https://notion.so" title="Notion">
                <img src="https://www.notion.so/favicon.ico" alt="Notion" width="20" height="20" />
              </a>
              <a class="shortcut-tile" data-url="https://linkedin.com" title="LinkedIn">
                <img src="https://www.linkedin.com/favicon.ico" alt="LinkedIn" width="20" height="20" />
              </a>
              <a class="shortcut-tile" data-url="https://gmail.com" title="Gmail">
                <img src="https://ssl.gstatic.com/ui/v1/icons/mail/rfr/gmail.ico" alt="Gmail" width="20" height="20" />
              </a>
            </div>

            <div class="welcome-search">
              <div class="welcome-search-icon"></div>
              <input
                type="text"
                id="welcome-search-input"
                class="welcome-search-input"
                placeholder="Search or enter URL"
                spellcheck="false"
                autocomplete="off"
              />
              <div class="welcome-search-kbd"><kbd>&#8984;L</kbd></div>
            </div>

            <div class="welcome-hint">
              <kbd>&#8984;T</kbd> new tab
            </div>
          </div>
        </div>

        <!-- Tab content rendered by WebContentsView in main process -->
      </div>
    </main>
    </div><!-- /.app-body -->

    <!-- Floating sidebar — independent overlay panel -->
    <div id="floating-sidebar" class="floating-sidebar"></div>

    <!-- Tab context menu -->
    <div class="context-menu" id="tab-context-menu">
      <button class="context-menu-item" data-action="pin">
        <span class="context-menu-label" id="ctx-pin-label">Pin tab</span>
      </button>
      <button class="context-menu-item" data-action="save">
        <span class="context-menu-label">Save to bookmarks</span>
      </button>
      <div class="context-menu-separator"></div>
      <button class="context-menu-item context-menu-danger" data-action="close">
        <span class="context-menu-label">Close tab</span>
      </button>
    </div>
  </div>

  <!-- Update Toast -->
  <div id="update-toast"></div>

  <script src="dist/renderer.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/titlebar.css">
  <link rel="stylesheet" href="styles/sidebar.css">
  <link rel="stylesheet" href="styles/content.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/light-mode.css">
</head>
<body>
  <div id="app">
    <!-- Titlebar — full width, drag region -->
    <header id="titlebar" class="titlebar">
      <div class="titlebar-drag-region"></div>

      <!-- Left: traffic light spacer + sidebar toggle + logo -->
      <div class="titlebar-left">
        <button class="icon-btn sidebar-collapse-btn" id="sidebar-collapse-btn" title="Toggle sidebar"></button>
        <div class="titlebar-logo">
          <!-- Dark mode logo -->
          <svg class="logo-icon logo-icon-dark" width="20" height="23" viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="tb-fD" x1="0.2" y1="0" x2="0.8" y2="1"><stop offset="0%" stop-color="#1E1B2E"/><stop offset="100%" stop-color="#2D2640"/></linearGradient>
              <radialGradient id="tb-pD" cx="0.5" cy="0.43" r="0.55"><stop offset="0%" stop-color="#FDFCFF"/><stop offset="22%" stop-color="#F3E8FF"/><stop offset="45%" stop-color="#E9D5FF"/><stop offset="65%" stop-color="#D8B4FE"/><stop offset="85%" stop-color="#C4B5FD"/><stop offset="100%" stop-color="#B197FC"/></radialGradient>
              <radialGradient id="tb-bD" cx="0.5" cy="0.4" r="0.25"><stop offset="0%" stop-color="#fff"/><stop offset="30%" stop-color="#FAF5FF" stop-opacity="0.9"/><stop offset="60%" stop-color="#F3E8FF" stop-opacity="0.5"/><stop offset="100%" stop-color="#E9D5FF" stop-opacity="0"/></radialGradient>
              <filter id="tb-sD" x="-10%" y="-8%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#A855F7" flood-opacity="0.25"/></filter>
              <clipPath id="tb-cD"><rect x="22" y="20" width="68" height="96" rx="34"/></clipPath>
            </defs>
            <g transform="translate(6,2)">
              <rect x="4" y="2" width="104" height="132" rx="30" fill="url(#tb-fD)" filter="url(#tb-sD)"/>
              <rect x="4" y="2" width="104" height="132" rx="30" fill="none" stroke="#7C3AED" stroke-width="1" stroke-opacity="0.3"/>
              <rect x="22" y="20" width="68" height="96" rx="34" fill="url(#tb-pD)"/>
              <g clip-path="url(#tb-cD)">
                <ellipse cx="56" cy="70" rx="32" ry="44" fill="none" stroke="#C4B5FD" stroke-width="1" opacity="0.14"/>
                <ellipse cx="56" cy="67" rx="26" ry="36" fill="none" stroke="#FAF5FF" stroke-width="0.9" opacity="0.17"/>
                <ellipse cx="56" cy="64" rx="20" ry="28" fill="none" stroke="#E9D5FF" stroke-width="0.8" opacity="0.2"/>
                <ellipse cx="56" cy="61" rx="14" ry="20" fill="none" stroke="#FAF5FF" stroke-width="0.7" opacity="0.26"/>
                <ellipse cx="56" cy="59" rx="9" ry="13" fill="none" stroke="#FAF5FF" stroke-width="0.6" opacity="0.34"/>
                <rect x="22" y="20" width="68" height="96" rx="34" fill="url(#tb-bD)"/>
              </g>
              <circle cx="56" cy="56" r="6" fill="#fff" opacity="0.95"/>
              <circle cx="56" cy="56" r="2.5" fill="#fff"/>
            </g>
          </svg>
          <!-- Light mode logo -->
          <svg class="logo-icon logo-icon-light" width="20" height="23" viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="tb-fL" x1="0.2" y1="0" x2="0.8" y2="1"><stop offset="0%" stop-color="#F5F3FF"/><stop offset="100%" stop-color="#DDD6FE"/></linearGradient>
              <radialGradient id="tb-pL" cx="0.5" cy="0.43" r="0.55"><stop offset="0%" stop-color="#FDFCFF"/><stop offset="22%" stop-color="#F3E8FF"/><stop offset="45%" stop-color="#E9D5FF"/><stop offset="65%" stop-color="#D8B4FE"/><stop offset="85%" stop-color="#C4B5FD"/><stop offset="100%" stop-color="#B197FC"/></radialGradient>
              <radialGradient id="tb-bL" cx="0.5" cy="0.4" r="0.25"><stop offset="0%" stop-color="#fff"/><stop offset="30%" stop-color="#FAF5FF" stop-opacity="0.9"/><stop offset="60%" stop-color="#F3E8FF" stop-opacity="0.5"/><stop offset="100%" stop-color="#E9D5FF" stop-opacity="0"/></radialGradient>
              <filter id="tb-sL" x="-8%" y="-6%" width="116%" height="116%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#7E22CE" flood-opacity="0.12"/></filter>
              <clipPath id="tb-cL"><rect x="22" y="20" width="68" height="96" rx="34"/></clipPath>
            </defs>
            <g transform="translate(6,2)">
              <rect x="4" y="2" width="104" height="132" rx="30" fill="url(#tb-fL)" filter="url(#tb-sL)"/>
              <rect x="4" y="2" width="104" height="132" rx="30" fill="none" stroke="#C4B5FD" stroke-width="1.2" stroke-opacity="0.5"/>
              <rect x="22" y="20" width="68" height="96" rx="34" fill="url(#tb-pL)"/>
              <g clip-path="url(#tb-cL)">
                <ellipse cx="56" cy="70" rx="32" ry="44" fill="none" stroke="#C4B5FD" stroke-width="1" opacity="0.14"/>
                <ellipse cx="56" cy="67" rx="26" ry="36" fill="none" stroke="#FAF5FF" stroke-width="0.9" opacity="0.17"/>
                <ellipse cx="56" cy="64" rx="20" ry="28" fill="none" stroke="#E9D5FF" stroke-width="0.8" opacity="0.2"/>
                <ellipse cx="56" cy="61" rx="14" ry="20" fill="none" stroke="#FAF5FF" stroke-width="0.7" opacity="0.26"/>
                <ellipse cx="56" cy="59" rx="9" ry="13" fill="none" stroke="#FAF5FF" stroke-width="0.6" opacity="0.34"/>
                <rect x="22" y="20" width="68" height="96" rx="34" fill="url(#tb-bL)"/>
              </g>
              <circle cx="56" cy="56" r="6" fill="#fff" opacity="0.95"/>
              <circle cx="56" cy="56" r="2.5" fill="#fff"/>
            </g>
          </svg>
          <span class="logo-text">Portal</span>
        </div>
      </div>

      <!-- Center: URL / Search bar -->
      <div class="titlebar-center">
        <div class="titlebar-url-bar">
          <div class="url-input-icon"></div>
          <input
            type="text"
            id="url-input"
            placeholder="Search or enter URL"
            spellcheck="false"
            autocomplete="off"
          />
        </div>
      </div>

      <!-- Right: nav + actions -->
      <div class="titlebar-right">
        <div class="titlebar-group">
          <button class="icon-btn" id="back-btn" title="Go back"></button>
          <button class="icon-btn" id="forward-btn" title="Go forward"></button>
          <button class="icon-btn" id="reload-btn" title="Reload"></button>
        </div>
        <div class="titlebar-divider"></div>
        <div class="titlebar-group">
          <button class="icon-btn" id="devtools-btn" title="Toggle DevTools"></button>
          <button class="icon-btn" id="theme-toggle-btn" title="Toggle light/dark mode">
            <span class="theme-icon theme-icon-sun"></span>
            <span class="theme-icon theme-icon-moon"></span>
          </button>
        </div>
      </div>
    </header>

    <!-- App body: sidebar + content -->
    <div class="app-body">
      <!-- Sidebar hover trigger (visible when collapsed) -->
      <div id="sidebar-trigger" class="sidebar-trigger">
        <div class="sidebar-trigger-icon"></div>
      </div>

      <!-- Sidebar -->
      <aside id="sidebar" class="sidebar">
        <!-- Pinned / Saved Sites -->
        <div class="sidebar-pinned">
          <div class="section-label">
            <span>Saved</span>
            <button class="icon-btn" id="save-site-btn" title="Save current site"></button>
          </div>
          <div id="saved-list" class="saved-list"></div>
        </div>

        <!-- Tabs — main scrollable area -->
        <div class="sidebar-tabs">
          <div class="section-label">
            <span>Tabs</span>
            <button class="icon-btn" id="new-tab-btn" title="New tab"></button>
          </div>
          <div id="tabs-list" class="tabs-list"></div>
        </div>
      </aside>

      <!-- Content Area -->
      <main id="content" class="content">
      <div class="content-frame">
        <!-- Welcome screen shown when no tab is active -->
        <div id="welcome" class="welcome">
          <div class="welcome-inner">
            <h1 class="welcome-greeting" id="welcome-greeting"></h1>
            <p class="welcome-subtitle">Where would you like to go?</p>

            <div class="welcome-shortcuts" id="welcome-shortcuts">
              <a class="shortcut-tile" data-url="https://google.com">
                <div class="shortcut-icon">
                  <img src="https://www.google.com/favicon.ico" alt="" width="20" height="20" />
                </div>
                <span class="shortcut-label">Google</span>
              </a>
              <a class="shortcut-tile" data-url="https://youtube.com">
                <div class="shortcut-icon">
                  <img src="https://www.youtube.com/favicon.ico" alt="" width="20" height="20" />
                </div>
                <span class="shortcut-label">YouTube</span>
              </a>
              <a class="shortcut-tile" data-url="https://github.com">
                <div class="shortcut-icon">
                  <img src="https://github.com/favicon.ico" alt="" width="20" height="20" />
                </div>
                <span class="shortcut-label">GitHub</span>
              </a>
              <a class="shortcut-tile" data-url="https://twitter.com">
                <div class="shortcut-icon">
                  <img src="https://abs.twimg.com/favicons/twitter.3.ico" alt="" width="20" height="20" />
                </div>
                <span class="shortcut-label">X</span>
              </a>
              <a class="shortcut-tile" data-url="https://reddit.com">
                <div class="shortcut-icon">
                  <img src="https://www.reddit.com/favicon.ico" alt="" width="20" height="20" />
                </div>
                <span class="shortcut-label">Reddit</span>
              </a>
              <a class="shortcut-tile" data-url="https://notion.so">
                <div class="shortcut-icon">
                  <img src="https://www.notion.so/favicon.ico" alt="" width="20" height="20" />
                </div>
                <span class="shortcut-label">Notion</span>
              </a>
              <a class="shortcut-tile" data-url="https://linkedin.com">
                <div class="shortcut-icon">
                  <img src="https://www.linkedin.com/favicon.ico" alt="" width="20" height="20" />
                </div>
                <span class="shortcut-label">LinkedIn</span>
              </a>
              <a class="shortcut-tile" data-url="https://gmail.com">
                <div class="shortcut-icon">
                  <img src="https://ssl.gstatic.com/ui/v1/icons/mail/rfr/gmail.ico" alt="" width="20" height="20" />
                </div>
                <span class="shortcut-label">Gmail</span>
              </a>
            </div>

            <div class="welcome-hint">
              <kbd>&#8984;L</kbd> to focus URL bar &nbsp;&middot;&nbsp; <kbd>&#8984;T</kbd> new tab
            </div>
          </div>
        </div>

        <!-- Webviews get injected here -->
        <div id="webview-container" class="webview-container"></div>
      </div>
    </main>
    </div><!-- /.app-body -->
  </div>

  <script src="dist/renderer.js"></script>
</body>
</html>
